<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registration Page</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background-color: #f5f5f5;
}

.register-card {
	background: #0d6efd;
	color: white;
	border-radius: 15px;
	padding: 35px;
	box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
}

.login-link {
	text-decoration: none;
	color: white;
	font-weight: 500;
}

.login-link:hover {
	text-decoration: underline;
	color: #dcdcdc;
}
</style>

</head>
<body>

	<div
		class="container vh-100 d-flex justify-content-center align-items-center">

		<div class="col-12 col-sm-10 col-md-7 col-lg-5">

			<div class="register-card">

				<h2 class="text-center mb-4">Registration Form</h2>

				<form action="registration" method="post">

					<input type="text" name="name" placeholder="Enter Name"
						class="form-control mb-3" autocomplete="off" required> <input
						type="email" name="email" placeholder="Enter E-mail"
						class="form-control mb-3" autocomplete="off" required> <input
						type="text" name="contact" placeholder="Enter Contact"
						class="form-control mb-3" autocomplete="off" required> <input
						type="text" name="username" placeholder="Enter Username"
						class="form-control mb-3" autocomplete="off" required> <input
						type="password" name="password" placeholder="Enter Password"
						class="form-control mb-4" autocomplete="off" required>

					<div class="d-flex justify-content-between align-items-center">

						<input type="submit" name="btnsubmit" value="Register"
							class="btn btn-light px-4"> <a href="login.html"
							class="login-link"> Login </a>

					</div>

				</form>

			</div>

		</div>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
