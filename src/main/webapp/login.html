<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Page</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background-color: #f5f5f5;
}

.login-card {
	background: #0d6efd;
	color: white;
	border-radius: 15px;
	padding: 40px;
	box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
}

.register-link {
	text-decoration: none;
	color: white;
	font-weight: 500;
}

.register-link:hover {
	text-decoration: underline;
	color: #dcdcdc;
}
</style>

</head>
<body>

	<div
		class="container vh-100 d-flex justify-content-center align-items-center">

		<div class="col-12 col-sm-10 col-md-6 col-lg-4">

			<div class="login-card">

				<h2 class="text-center mb-4">Login Form</h2>

				<form action="validateadmin" method="post">

					<input type="text" name="username" placeholder="Enter Username"
						class="form-control mb-3" required> <input type="password"
						name="password" placeholder="Enter Password"
						class="form-control mb-4" required>

					<div class="d-flex justify-content-between align-items-center">

						<input type="submit" name="s" value="Login"
							class="btn btn-light px-4"> <a href="Registration.html"
							class="register-link"> Register </a>

					</div>

				</form>

			</div>

		</div>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
